<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>石大生存指南</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//unpkg.com/docsify/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  
  <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
  
<script>
window。$docsify = {
    name: '石大生存指南',
    loadSidebar: true,
    alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
    },
    subMaxLevel: 2,
    auto2top: true,
    
    // 👇 1. 你的 Cusdis 原始配置，我们保留在这里
    cusdis: {
        host: 'https://cusdis.com',
        appId: '15d36221-e8cc-4506-b2d5-fc79253e71d8'
    },
    
    // 👇 2. 这里是解决问题的“手动导航”插件
    plugins: [
        function(hook) {
            hook.doneEach(function() {
                // 这一句的作用是，当每次进入一个页面，就试着去“唤醒”Cusdis的评论框
                if (window.renderCusdis) {
                    window.renderCusdis();
                }
            });
        }
    ]
};
</script>
</body>
</html>
