<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>石大生存指南</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//unpkg.com/docsify/lib/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  
  <script src="//unpkg.com/docsify/lib/docsify.min.js"></script>
  
  <!-- Cusdis 插件文件 -->
  <script src="https://cusdis.com/js/cusdis.docsify.js"></script>
  
  <script>
    window.$docsify = {
      // 网站名称（左上角显示）
      name: '石大生存指南',
      // 开启侧边栏：自动读取根目录的 _sidebar.md 文件
      loadSidebar: true,
      // 所有页面共用同一个侧边栏
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      // 页面标题跟随内容切换
      subMaxLevel: 2,
      // 自动显示目录层级
      auto2top: true,
      // 👇 新增：Cusdis 配置
      cusdis: {
        host: 'https://cusdis.com',
        appId: '15d36221-e8cc-4506-b2d5-fc79253e71d8'
      }
    }
  </script>
</body>
</html>
