<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>石大生存指南</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artalk/dist/Artalk.css">
</head>
<body>
  <div id="app"></div>
  <div id="Comments"></div>
  <script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/artalk/dist/Artalk.js"></script>
  <script>
    window.$docsify = {
      name: '石大生存指南',
      loadSidebar: true,
      alias: { '/.*/_sidebar.md': '/_sidebar.md' },
      subMaxLevel: 2,
      auto2top: true,
      plugins: [
        function (hook, vm) {
          hook.doneEach(function() {
            // 兼容 Artalk v2 CDN 用法
            if (window.artalkIns) window.artalkIns.destroy()
            window.artalkIns = window.Artalk.init({
              el: '#Comments',
              site: '石大生存指南',
              pageKey: location.hash,
              pageTitle: document.title,
              server: 'https://artalk-demo.js.org',
              useBackendConf: false
            })
          })
        }
      ]
    }
  </script>
</body>
</html>
